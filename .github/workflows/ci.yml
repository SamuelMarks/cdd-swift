name: CI

on:
  push:
    branches: [ "master", "main" ]
    tags: [ "v*.*.*", "latest" ]
  pull_request:
    branches: [ "master", "main" ]

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-15]
    steps:
    - uses: actions/checkout@v6

    - name: Set up Swift
      if: runner.os == 'Linux'
      uses: swift-actions/setup-swift@v2
      with:
        swift-version: "6.0"

    - name: Install Linting & Formatting tools (macOS)
      if: runner.os == 'macOS'
      run: brew install swiftformat swiftlint

    - name: Install Linting & Formatting tools (Linux)
      if: runner.os == 'Linux'
      run: |
        git clone --depth 1 -b 0.63.2 https://github.com/realm/SwiftLint.git && cd SwiftLint && swift build -c release && sudo cp .build/release/swiftlint /usr/local/bin/ && cd .. && rm -rf SwiftLint
        git clone --depth 1 -b 0.61.1 https://github.com/nicklockwood/SwiftFormat.git && cd SwiftFormat && swift build -c release && sudo cp .build/release/swiftformat /usr/local/bin/ && cd .. && rm -rf SwiftFormat

    - name: Format Check
      run: swiftformat --lint .

    - name: Lint Check
      run: swiftlint

    - name: Build
      run: swift build -c release

    - name: Run tests
      run: |
        if [ "$RUNNER_OS" == "Linux" ]; then
          swift test --enable-code-coverage
        else
          swift test
        fi

    - name: Swagger 2.0 Petstore test
      if: runner.os == 'Linux'
      run: |
        docker run -d -p 8080:8080 -e SWAGGER_HOST="http://localhost:8080" -e SWAGGER_BASE_PATH="/v2" --name petstore_server swaggerapi/petstore >/dev/null || true
        sleep 5
        curl -s -f http://localhost:8080/v2/swagger.json > petstore.json || true
        if ! python3 -c "import json; json.load(open('petstore.json'))" 2>/dev/null; then
          curl -s -f https://petstore.swagger.io/v2/swagger.json > petstore.json || true
        fi
        swift run cdd-swift from_openapi to_sdk -i petstore.json -o ../cdd-swift-client-swagger --tests
        cd ../cdd-swift-client-swagger && swift test
        docker rm -f petstore_server || true

    - name: OpenAPI 3.2.0 Petstore test
      if: runner.os == 'Linux'
      run: |
        pip3 install --break-system-packages pyyaml
        docker run -d -p 8080:8080 -e SWAGGER_HOST="http://localhost:8080" -e SWAGGER_BASE_PATH="/api/v3" --name petstore_server swaggerapi/petstore >/dev/null || true
        sleep 5
        curl -s -f http://localhost:8080/api/v3/openapi.json > petstore_oas3.json || true
        if ! python3 -c "import json; json.load(open('petstore_oas3.json'))" 2>/dev/null; then
          echo "Fallback to YAML"
          curl -s -f https://raw.githubusercontent.com/swagger-api/swagger-petstore/master/src/main/resources/openapi.yaml > petstore_oas3.yaml || true
          if [ -s petstore_oas3.yaml ]; then
            python3 -c "import yaml, json, sys; sys.stdout.write(json.dumps(yaml.safe_load(sys.stdin)))" < petstore_oas3.yaml > petstore_oas3.json || true
          fi
        fi
        swift run cdd-swift from_openapi to_sdk -i petstore_oas3.json -o ../cdd-swift-client-openapi --tests
        cd ../cdd-swift-client-openapi && swift test
        docker rm -f petstore_server || true

    - name: Upload Linux Artifact
      if: runner.os == 'Linux' && startsWith(github.ref, 'refs/tags/')
      uses: actions/upload-artifact@v7
      with:
        name: cdd-swift-linux
        path: .build/release/cdd-swift

    - name: Upload macOS Artifact
      if: runner.os == 'macOS' && startsWith(github.ref, 'refs/tags/')
      uses: actions/upload-artifact@v7
      with:
        name: cdd-swift-macos
        path: .build/release/cdd-swift

  build-wasm:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6

    - name: Set up Swift
      uses: swift-actions/setup-swift@v2
      with:
        swift-version: "6.0.3"

    - name: Install SwiftWasm
      run: |
        swift sdk install https://github.com/swiftwasm/swift/releases/download/swift-wasm-6.0.3-RELEASE/swift-wasm-6.0.3-RELEASE-wasm32-unknown-wasi.artifactbundle.zip --checksum 31d3585b06dd92de390bacc18527801480163188cd7473f492956b5e213a8618
        python scripts/build_wasm.py

    - name: Upload WASM Artifact
      if: startsWith(github.ref, 'refs/tags/')
      uses: actions/upload-artifact@v7
      with:
        name: cdd-swift-wasm
        path: bin/cdd-swift.wasm

  release:
    needs: [build, build-wasm]
    if: startsWith(github.ref, 'refs/tags/v')

    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6

      - uses: actions/download-artifact@v8
        with:
          path: artifacts

      - name: Rename binaries
        run: |
          mv artifacts/cdd-swift-linux/cdd-swift cdd-swift-linux
          mv artifacts/cdd-swift-macos/cdd-swift cdd-swift-macos
          mv artifacts/cdd-swift-wasm/cdd-swift.wasm .

      - name: Release Version
        if: github.event_name == 'push'
        uses: softprops/action-gh-release@v3
        with:
          files: |
            cdd-swift-linux
            cdd-swift-macos
            cdd-swift.wasm
          generate_release_notes: true
          make_latest: true

      - name: Update latest tag
        if: github.event_name == 'push'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git push origin :refs/tags/latest || true
          git tag -fa latest -m "Update latest tag to match ${GITHUB_REF_NAME}"
          git push origin latest

      - name: Release Latest
        if: github.event_name == 'push'
        uses: softprops/action-gh-release@v3
        with:
          tag_name: latest
          name: latest
          files: |
            cdd-swift-linux
            cdd-swift-macos
            cdd-swift.wasm
          make_latest: false
