repos:
-   repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.5.0
    hooks:
    -   id: trailing-whitespace
    -   id: end-of-file-fixer
    -   id: check-yaml
    -   id: check-added-large-files
    -   id: mixed-line-ending
        args: ['--fix=lf']
        exclude: \.(bat|cmd|ps1)$
-   repo: https://github.com/nicklockwood/SwiftFormat
    rev: 0.61.1
    hooks:
    -   id: swiftformat
        name: Auto-format Code (swiftformat)
    -   id: swiftformat
        name: Check Code Formatting
        args: [--lint]
-   repo: https://github.com/realm/SwiftLint
    rev: 0.54.0
    hooks:
    -   id: swiftlint
-   repo: local
    hooks:
    -   id: build
        name: Build
        entry: swift build
        language: system
        pass_filenames: false
    -   id: run-tests
        name: Run tests
        entry: swift test --enable-code-coverage
        language: system
        pass_filenames: false
    -   id: build-wasm
        name: Build WASM
        entry: python scripts/build_wasm.py
        language: python
        pass_filenames: false
    -   id: swagger-2-0-petstore
        name: Swagger 2.0 Petstore test
        entry: python scripts/test_swagger_2_0.py
        language: python
        pass_filenames: false
    -   id: openapi-3-2-0-petstore
        name: OpenAPI 3.2.0 Petstore test
        entry: python scripts/test_openapi_3_2_0.py
        language: python
        pass_filenames: false
    -   id: update-badges
        name: Update Badges (Doc & Test Coverage)
        entry: python scripts/update_badges.py
        language: python
        pass_filenames: false
        always_run: true
