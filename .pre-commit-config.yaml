repos:
-   repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.5.0
    hooks:
    -   id: trailing-whitespace
    -   id: end-of-file-fixer
    -   id: check-yaml
    -   id: check-added-large-files
-   repo: https://github.com/nicklockwood/SwiftFormat
    rev: 0.53.5
    hooks:
    -   id: swiftformat
-   repo: https://github.com/realm/SwiftLint
    rev: 0.54.0
    hooks:
    -   id: swiftlint
-   repo: local
    hooks:
    -   id: build
        name: Build
        entry: swift build
        language: system
        pass_filenames: false
    -   id: run-tests
        name: Run tests
        entry: swift test --enable-code-coverage
        language: system
        pass_filenames: false
    -   id: update-badges
        name: Update Badges
        entry: python3 scripts/update_badges.py
        language: system
        pass_filenames: false
