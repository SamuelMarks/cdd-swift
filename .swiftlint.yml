excluded:
  - .build
  - .swiftpm
  - Package.resolved
  - test_out

disabled_rules:
  - force_try
  - file_length
  - type_body_length

line_length:
  warning: 3000
  error: 3000

cyclomatic_complexity:
  warning: 200
  error: 200

function_body_length:
  warning: 2000
  error: 2000

identifier_name:
  allowed_symbols: ["_"]
  min_length:
    warning: 1
    error: 1
